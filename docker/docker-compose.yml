version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: booksmart-mysql
    restart: unless-stopped

    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

    environment:
      TZ: Asia/Ho_Chi_Minh
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: booksmart
      MYSQL_USER: booksmart
      MYSQL_PASSWORD: booksmart

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - booksmart-network

  adminer:
    image: adminer:latest
    container_name: booksmart-adminer
    restart: unless-stopped

    ports:
      - "8081:8080"

    depends_on:
      - mysql

    networks:
      - booksmart-network

volumes:
  mysql_data:

networks:
  booksmart-network:
    driver: bridge