spring:
  datasource:
    url: jdbc:mysql://localhost:3306/booksmart
    username: booksmart
    password: booksmart
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080